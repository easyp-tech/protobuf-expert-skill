# EasyP starter config: strict API project (all 42 rules)
# Usage: copy to your project root as easyp.yaml

deps:
  - github.com/googleapis/googleapis
  - github.com/protocolbuffers/protobuf

lint:
  use:
    - DEFAULT
    - COMMENTS
    - UNARY_RPC
    - PACKAGE_NO_IMPORT_CYCLE
  allow_comment_ignores: true

generate:
  inputs:
    - directory: proto
  plugins:
    - name: go
      out: gen/go
      opts:
        paths: source_relative
    - name: go-grpc
      out: gen/go
      opts:
        paths: source_relative
        require_unimplemented_servers: false

breaking:
  against_git_ref: main
